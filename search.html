<!DOCTYPE html>

<head>

        body {
            font-family: Arial, sans-serif;
            display: flex;

        form {

            width: 300px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- modify this form HTML and place wherever you want your form -->
<form
  action="https://formspree.io/f/mykapwlp"
  method="POST"
>

    Your email:
    <input type="email" name="email">
  </label>
  <label>
    Your message:
    <textarea name="message"></textarea>
  </label>
  <!-- your other form fields go here -->
  <button type="submit">Send</button>
</form>

</body>
</html>
